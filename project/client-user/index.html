<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fidelity - User Panel</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Fidelity User Panel</h1>

    <section class="card" id="auth-card">
      <h2>Register</h2>
      <form id="register-form">
        <input name="username" placeholder="Username" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="phone" placeholder="Phone" />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Register</button>
      </form>

      <h2>Login</h2>
      <form id="login-form">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <section class="card hidden" id="dashboard-card">
      <div class="row-between">
        <h2>Dashboard</h2>
        <button id="logout-btn">Logout</button>
      </div>
      <p><strong>Wallet Balance:</strong> ₹<span id="wallet-balance">0.00</span></p>

      <h3>Update Profile</h3>
      <form id="profile-form">
        <input name="username" placeholder="Username" required />
        <input name="phone" placeholder="Phone" />
        <button type="submit">Save Profile</button>
      </form>

      <h3>Bank Details</h3>
      <form id="bank-form">
        <input name="bank_name" placeholder="Bank Name" required />
        <input name="account_number" placeholder="Account Number" required />
        <input name="ifsc" placeholder="IFSC" required />
        <button type="submit">Save Bank</button>
      </form>

      <h3>UPI Details</h3>
      <form id="upi-form">
        <input name="upi_id" placeholder="UPI ID" required />
        <button type="submit">Save UPI</button>
      </form>

      <h3>Withdraw Request</h3>
      <form id="withdraw-form">
        <input name="amount" type="number" min="1" placeholder="Amount" required />
        <button type="submit">Request Withdraw</button>
      </form>

      <h3>Transaction History</h3>
      <button id="refresh-history">Refresh History</button>
      <pre id="history-output"></pre>
    </section>

    <p id="message"></p>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
